name: Android APK Derleyici

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    - name: Java Kurulumu (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # Eksik olan tüm kök yapılandırma dosyalarını otomatik oluşturuyoruz
    - name: Eksik Proje Dosyalarını Otomatik Hazırla
      run: |
        if [ ! -f settings.gradle ]; then
          cat << 'EOF' > settings.gradle
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "More-Bezels"
          include(":app")
          EOF
        fi

        if [ ! -f build.gradle ]; then
          cat << 'EOF' > build.gradle
          plugins {
              id("com.android.application") version "8.5.0" apply false
              id("org.jetbrains.kotlin.android") version "1.9.22" apply false
          }
          EOF
        fi

        if [ ! -f gradle.properties ]; then
          cat << 'EOF' > gradle.properties
          android.useAndroidX=true
          android.nonTransitiveRClass=true
          kotlin.code.style=official
          EOF
        fi

    - name: Gradle Wrapper Oluştur
      run: gradle wrapper --gradle-version 8.5

    - name: Gradle Çalıştırma İzni Ver
      run: chmod +x gradlew

    - name: APK Derle (Build)
      run: ./gradlew assembleDebug

    - name: APK Dosyasını Yükle
      uses: actions/upload-artifact@v4
      with:
        name: More-Bezels-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        
