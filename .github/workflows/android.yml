name: Android APK Derleyici

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    - name: Java Kurulumu (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # Eksik olan derleme motorunu (gradlew) sıfırdan oluşturuyoruz
    - name: Gradle Wrapper Oluştur
      run: gradle wrapper --gradle-version 8.5

    - name: Gradle Çalıştırma İzni Ver
      run: chmod +x gradlew

    - name: APK Derle (Build)
      run: ./gradlew assembleDebug

    - name: APK Dosyasını Yükle
      uses: actions/upload-artifact@v4
      with:
        name: More-Bezels-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        
