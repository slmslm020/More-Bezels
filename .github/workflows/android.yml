name: Android APK Derleyici

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    - name: Java Kurulumu (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # GitHub'ın hata raporunda zorunlu tuttuğu resmi ilk kurulumu yapıyoruz
    - name: Proje İskeletini Resmi Olarak Başlat (Init)
      run: |
        gradle init --type pom --dsl kotlin --incubating

    # Şimdi senin uygulamanın ihtiyaç duyduğu depoları ekliyoruz
    - name: Ayar Dosyalarını Enjekte Et
      run: |
        printf "pluginManagement {\n    repositories {\n        google()\n        mavenCentral()\n        gradlePluginPortal()\n    }\n}\ndependencyResolutionManagement {\n    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)\n    repositories {\n        google()\n        mavenCentral()\n    }\n}\nrootProject.name = \"More-Bezels\"\ninclude(\":app\")\n" > settings.gradle.kts
        
        printf "plugins {\n    id(\"com.android.application\") version \"8.5.0\" apply false\n    id(\"org.jetbrains.kotlin.android\") version \"1.9.22\" apply false\n}\n" > build.gradle.kts

        echo "android.useAndroidX=true" > gradle.properties
        echo "android.nonTransitiveRClass=true" >> gradle.properties

    - name: Gradle Motorunu Tetikle (Wrapper)
      run: |
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew

    - name: APK Derle (Build)
      run: ./gradlew assembleDebug --stacktrace

    - name: APK Dosyasını Yükle
      uses: actions/upload-artifact@v4
      with:
        name: More-Bezels-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        
